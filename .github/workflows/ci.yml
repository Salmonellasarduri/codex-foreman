name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check shell syntax
        shell: bash
        run: bash -n foreman.sh worktree.sh tests/turn_guard_test.sh

      - name: Run turn guard tests
        shell: bash
        run: bash tests/turn_guard_test.sh
